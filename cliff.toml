# git-cliff configuration — generates the committed CHANGELOG.md (Keep a Changelog
# format) and the GitHub Release notes (single source) from Conventional-Commit
# squash-merge PR titles. See specs/006-release-automation/contracts/changelog.md.
#
# NOTE: validate against the installed git-cliff with `git cliff --version` and a
# `git cliff --unreleased --tag vX.Y.Z` dry-run before the first release — a few
# template/flag names have shifted across git-cliff versions.

[remote.github]
owner = "glapsfun"
repo = "rune"

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]\
    {% if release_link %}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}\
        - {{ commit.message | upper_first }}\
            {% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
    {% endfor %}\
{% endfor %}\n
"""
trim = true
footer = "<!-- generated by git-cliff -->"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Conventional-Commit type -> Keep a Changelog group.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Removed" },
  { message = "^docs", group = "Documentation" },
  { body = ".*security", group = "Security" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^build", skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
