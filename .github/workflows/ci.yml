name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race ./...
        env:
          CGO_ENABLED: "1"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  release-dryrun:
    name: release-dryrun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      # Validate the whole config (catches deprecated keys, e.g. brews -> homebrew_casks),
      # then build binaries + archives + checksums. Signing/SBOM/docker need cosign/syft/
      # OIDC and are exercised by the real release job, so they are skipped here.
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: GoReleaser snapshot (no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=sign,sbom,docker

  golden:
    name: golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      # Regenerate the golden-bearing packages, then fail if anything drifted —
      # ensures committed goldens match a fresh regeneration (never hand-edited).
      - name: Regenerate goldens
        run: go test ./internal/diag ./internal/lexer ./internal/parser ./internal/cli ./test/corpus -update
      - name: Check goldens are committed
        run: |
          if ! git diff --exit-code; then
            echo "::error::Goldens are out of date. Regenerate deliberately with -update (never hand-edit); if the grammar changed, update docs/GRAMMAR.md too."
            exit 1
          fi

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Fuzz lexer (smoke)
        run: go test -run=xxx -fuzz=FuzzLexer -fuzztime=20s ./internal/lexer
      - name: Fuzz parser (smoke)
        run: go test -run=xxx -fuzz=FuzzParser -fuzztime=20s ./internal/parser
