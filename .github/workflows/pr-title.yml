name: PR Title

# Enforce Conventional Commits on PR titles. With squash-merge + the repo setting
# "Default to PR title for squash merge commits", the validated title becomes the only
# commit on main — exactly what git-cliff parses for the changelog. Make this a required
# status check in branch protection. See specs/006-release-automation/contracts/changelog.md.

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
